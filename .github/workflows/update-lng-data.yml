name: Update LNG Export Data

# Runs on the 1st of March, June, September, December — aligned with DISR quarterly releases
on:
  schedule:
    - cron: '0 2 1 3,6,9,12 *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run LNG data fetch script
        id: fetch
        run: node scripts/fetch-lng-data.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated config if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet src/data/lng-config.json; then
            echo "No data change detected — skipping commit"
          else
            git add src/data/lng-config.json
            git commit -m "chore: update LNG export data [automated]"
            git push
          fi

      - name: Open issue if fetch failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: '⚠️ Automated LNG data update failed — manual review needed',
              body:  `The quarterly LNG data update workflow failed on ${new Date().toISOString()}.\n\nPlease manually check the [DISR Resources and Energy Quarterly](https://www.industry.gov.au/publications/resources-and-energy-quarterly) and update \`src/data/lng-config.json\` with the latest export volume and value figures.`
            })
